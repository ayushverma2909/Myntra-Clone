<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon"/>
  <title>Myntra</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header>
    <div class="logo_container"> 
      <a href="#"><img src="https://aartisto.com/wp-content/uploads/2020/11/myntra.png" class="myntra_home" alt="myntra home"></a>
    </div>

    <nav class="nav_bar">
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
      <a href="#">Home & Living</a>
      <a href="#">Beauty</a>
      <a href="#">Studio <sup>New</sup></a>
    </nav>

    <div class="search_bar">
      <span class="material-symbols-outlined search_icon">search</span>
      <input class="search_input" placeholder="Search for brands and latest products">
    </div>
    
    <div class="action_bar">
      <div class="action_container profile_container">
        <span class="material-symbols-outlined shop">person</span>
        <span class="action_name">Profile</span>
        <div class="profile_dropdown">
          <p>Welcome</p>
          <button class="login_btn" onclick="openLoginPage()">LOGIN / SIGNUP</button>
          <a href="#">Orders</a>
          <a href="#">Wishlist</a>
          <a href="#">Gift Cards</a>
          <a href="#">Contact Us</a>
          <a href="#">Myntra Insider <span class="new">New</span></a>
        </div>
      </div>
      
      <div class="action_container">
        <span class="material-symbols-outlined shop">favorite</span>
        <span class="action_name">Wishlist</span>
      </div>

      <div class="action_container" id="shopping-bag">
        <span class="material-symbols-outlined shop">shopping_bag</span>
        <span class="action_name">Shopping Bag</span>
        <span class="bag-item-count">0</span>
      </div>
    </div>
  </header>

  <main>
    <div class="items-container"></div>
  </main>

  <footer>
    <div class="footer_container">
      <div class="footer_column">
        <h3>ONLINE SHOPPING</h3>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Kids</a>
        <a href="#">Home & Living</a>
        <a href="#">Beauty</a>
      </div>
    </div>
    <hr>
    <div class="copyright">&COPY; 2024 www.myntra.com All rights reserved.</div>
  </footer>

  <script src="index.js"></script>
</body>
</html>
